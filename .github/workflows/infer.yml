name: Infer

on:
  push:
    branches: [ "master" ]
  pull_request:
    paths-ignore: [ '**.md' ]
    branches: [ main ]

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Install dependencies
      run: dotnet restore src/JfYu.sln
    - name: Build
      run: dotnet build --configuration Release --no-restore src/JfYu.sln

    - name: Run Infer1
      uses: microsoft/infersharpaction@v1.5
      id: runinfersharp1
      with:
        binary-path: src/JfYu.Data

    - name: Run Infer2
      uses: microsoft/infersharpaction@v1.5
      id: runinfersharp2
      with:
        binary-path: src/JfYu.Request

    - name: Upload SARIF output to GitHub Security Center
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: infer-out/report.sarif