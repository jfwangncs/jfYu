name: Infer

on:
  push:
    paths-ignore: [ '**.md' ]
    branches: [ main ]
  pull_request:
    paths-ignore: [ '**.md' ]
    branches: [ main ]

jobs:
  infer:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Run Infer#      
      run: |
        for bindir in $(find src -type d -name bin); do
          echo "Analyzing $bindir"
          infersharp --binary-path "$bindir" --output infer-out-$(basename $(dirname $bindir)).sarif || true
        done

    - name: Upload SARIF output to GitHub Security Center
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: infer-out/report.sarif