name: SonarCloud 

on:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed

jobs:
  sonarcloud: 
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download test results (linux8)
        uses: dawidd6/action-download-artifact@v3
        with:
          name: test-results-linux8
          path: TestResults          
          workflow: gate.yml
          commit: ${{ github.event.workflow_run.head_sha }}
                    
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: src  
          args: >
            -Dsonar.organization=jfwangncs_jfYu 
            -Dsonar.projectKey=jfwang
            -Dsonar.cs.vstest.reportsPaths=TestResults/*.trx
            -Dsonar.cs.opencover.reportPaths=coverage.net9.0.info.xml 

