# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: deploy package
on:
  push:
    branches: [ "master" ]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 5 
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        ports:
          - 1433:1433       
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: "StrongP@ssw0rd!"
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672 
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
    defaults:
      run:
        working-directory: src
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Install missing dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libc6-dev
        # 确保 libdl.so 存在
        if [ ! -f "/usr/lib/x86_64-linux-gnu/libdl.so" ]; then
          sudo ln -s /usr/lib/x86_64-linux-gnu/libdl.so.2 /usr/lib/x86_64-linux-gnu/libdl.so
        fi

        # 确保路径正确
        export LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
        echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV
    - name: Unit test
      run:  dotnet test      
    - name: Clean old packages
      run: dotnet clean 
    - name: Build
      run: dotnet build -c release 
    - name: Push NuGet packages
      run: |
        for file in $(find ./ -name "*.nupkg"); do
          dotnet nuget push "$file" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate;
        done
