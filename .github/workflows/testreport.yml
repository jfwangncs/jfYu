name: 'Test Report'
on:
  workflow_run:
    workflows: ['Build']
    types:
      - completed
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
    - name: Report win .NET 4.8
      uses: phoenix-actions/test-reporting@v15
      id: unit-test-report-win48          # Set ID reference for step
      with:
        artifact: test-results-win48      # artifact name
        name: Test results (win net4.8)   # Name of the check run which will be created
        path: '*.trx'                     # Path to test results (inside artifact .zip)
        reporter: dotnet-trx              # Format of test results
        only-summary: 'true'

    - name: Report win 9.0
      uses: phoenix-actions/test-reporting@v15
      id: unit-test-report-win9
      with:
        artifact: test-results-win9
        name: Test results (win 9.0)
        path: '*.trx'
        reporter: dotnet-trx
        only-summary: 'true'

    - name: Report mac 9.0
      uses: phoenix-actions/test-reporting@v15
      id: unit-test-report-mac
      with:
        artifact: test-results-mac9
        name: Test results (mac 9.0)
        path: '*.trx'
        reporter: dotnet-trx
        only-summary: 'true'

    - name: Report linux 9.0
      uses: phoenix-actions/test-reporting@v15
      id: unit-test-report-linux
      with:
        artifact: test-results-linux9
        name: Test results (linux 9.0)
        path: '*.trx'
        reporter: dotnet-trx
        only-summary: 'true'